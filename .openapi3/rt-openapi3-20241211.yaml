openapi: 3.0.0
info:
  title: OpenAI API
  description: The OpenAI REST API. Please see https://platform.openai.com/docs/api-reference for more details.
  version: 0.0.0
tags:
  - name: Realtime
paths:
  /realtime:
    post:
      operationId: Realtime_startRealtimeSession
      summary: Starts a real-time conversation session.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RealtimeServerEvent'
      tags:
        - Realtime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/RealtimeClientEvent'
security:
  - BearerAuth: []
components:
  schemas:
    RealtimeAudioFormat:
      anyOf:
        - type: string
        - type: string
          enum:
            - pcm16
            - g711_ulaw
            - g711_alaw
    RealtimeAudioInputTranscriptionModel:
      anyOf:
        - type: string
        - type: string
          enum:
            - whisper-1
    RealtimeAudioInputTranscriptionSettings:
      type: object
      properties:
        model:
          allOf:
            - $ref: '#/components/schemas/RealtimeAudioInputTranscriptionModel'
          default: whisper-1
    RealtimeClientEvent:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/RealtimeClientEventType'
        event_id:
          type: string
      discriminator:
        propertyName: type
        mapping:
          session.update: '#/components/schemas/RealtimeClientEventSessionUpdate'
          input_audio_buffer.append: '#/components/schemas/RealtimeClientEventInputAudioBufferAppend'
          input_audio_buffer.commit: '#/components/schemas/RealtimeClientEventInputAudioBufferCommit'
          input_audio_buffer.clear: '#/components/schemas/RealtimeClientEventInputAudioBufferClear'
          conversation.item.create: '#/components/schemas/RealtimeClientEventConversationItemCreate'
          conversation.item.truncate: '#/components/schemas/RealtimeClientEventConversationItemTruncate'
          conversation.item.delete: '#/components/schemas/RealtimeClientEventConversationItemDelete'
          response.create: '#/components/schemas/RealtimeClientEventResponseCreate'
          response.cancel: '#/components/schemas/RealtimeClientEventResponseCancel'
    RealtimeClientEventConversationItemCreate:
      type: object
      required:
        - type
        - item
      properties:
        type:
          type: string
          enum:
            - conversation.item.create
          description: The event type, must be `conversation.item.create`.
        previous_item_id:
          type: string
          description: |-
            The ID of the preceding item after which the new item will be inserted. 
            If not set, the new item will be appended to the end of the conversation. 
            If set, it allows an item to be inserted mid-conversation. If the ID 
            cannot be found, an error will be returned and the item will not be added.
        item:
          $ref: '#/components/schemas/RealtimeConversationRequestItem'
      allOf:
        - $ref: '#/components/schemas/RealtimeClientEvent'
      description: |-
        Add a new Item to the Conversation's context, including messages, function 
        calls, and function call responses. This event can be used both to populate a 
        "history" of the conversation and to add new items mid-stream, but has the 
        current limitation that it cannot populate assistant audio messages.

        If successful, the server will respond with a `conversation.item.created` 
        event, otherwise an `error` event will be sent.
    RealtimeClientEventConversationItemDelete:
      type: object
      required:
        - type
        - item_id
      properties:
        type:
          type: string
          enum:
            - conversation.item.delete
          description: The event type, must be `conversation.item.delete`.
        item_id:
          type: string
          description: The ID of the item to delete.
      allOf:
        - $ref: '#/components/schemas/RealtimeClientEvent'
      description: |-
        Send this event when you want to remove any item from the conversation 
        history. The server will respond with a `conversation.item.deleted` event, 
        unless the item does not exist in the conversation history, in which case the 
        server will respond with an error.
    RealtimeClientEventConversationItemTruncate:
      type: object
      required:
        - type
        - item_id
        - content_index
        - audio_end_ms
      properties:
        type:
          type: string
          enum:
            - conversation.item.truncate
          description: The event type, must be `conversation.item.truncate`.
        item_id:
          type: string
          description: |-
            The ID of the assistant message item to truncate. Only assistant message 
            items can be truncated.
        content_index:
          type: integer
          format: int32
          description: The index of the content part to truncate. Set this to 0.
        audio_end_ms:
          type: integer
          format: int32
          description: |-
            Inclusive duration up to which audio is truncated, in milliseconds. If 
            the audio_end_ms is greater than the actual audio duration, the server 
            will respond with an error.
      allOf:
        - $ref: '#/components/schemas/RealtimeClientEvent'
      description: |-
        Send this event to truncate a previous assistant message’s audio. The server 
        will produce audio faster than realtime, so this event is useful when the user 
        interrupts to truncate audio that has already been sent to the client but not 
        yet played. This will synchronize the server's understanding of the audio with 
        the client's playback.

        Truncating audio will delete the server-side text transcript to ensure there 
        is not text in the context that hasn't been heard by the user.

        If successful, the server will respond with a `conversation.item.truncated` 
        event.
    RealtimeClientEventInputAudioBufferAppend:
      type: object
      required:
        - type
        - audio
      properties:
        type:
          type: string
          enum:
            - input_audio_buffer.append
          description: The event type, must be `input_audio_buffer.append`.
        audio:
          type: string
          format: base64
          description: |-
            Base64-encoded audio bytes. This must be in the format specified by the 
            `input_audio_format` field in the session configuration.
      allOf:
        - $ref: '#/components/schemas/RealtimeClientEvent'
      description: |-
        Send this event to append audio bytes to the input audio buffer. The audio 
        buffer is temporary storage you can write to and later commit. In Server VAD 
        mode, the audio buffer is used to detect speech and the server will decide 
        when to commit. When Server VAD is disabled, you must commit the audio buffer
        manually.

        The client may choose how much audio to place in each event up to a maximum 
        of 15 MiB, for example streaming smaller chunks from the client may allow the 
        VAD to be more responsive. Unlike made other client events, the server will 
        not send a confirmation response to this event.
    RealtimeClientEventInputAudioBufferClear:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - input_audio_buffer.clear
          description: The event type, must be `input_audio_buffer.clear`.
      allOf:
        - $ref: '#/components/schemas/RealtimeClientEvent'
      description: |-
        Send this event to clear the audio bytes in the buffer. The server will 
        respond with an `input_audio_buffer.cleared` event.
    RealtimeClientEventInputAudioBufferCommit:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - input_audio_buffer.commit
          description: The event type, must be `input_audio_buffer.commit`.
      allOf:
        - $ref: '#/components/schemas/RealtimeClientEvent'
      description: |-
        Send this event to commit the user input audio buffer, which will create a 
        new user message item in the conversation. This event will produce an error 
        if the input audio buffer is empty. When in Server VAD mode, the client does 
        not need to send this event, the server will commit the audio buffer 
        automatically.

        Committing the input audio buffer will trigger input audio transcription 
        (if enabled in session configuration), but it will not create a response 
        from the model. The server will respond with an `input_audio_buffer.committed` 
        event.
    RealtimeClientEventResponseCancel:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - response.cancel
          description: The event type, must be `response.cancel`.
      allOf:
        - $ref: '#/components/schemas/RealtimeClientEvent'
      description: |-
        Send this event to cancel an in-progress response. The server will respond 
        with a `response.cancelled` event or an error if there is no response to 
        cancel.
    RealtimeClientEventResponseCreate:
      type: object
      required:
        - type
        - response
      properties:
        type:
          type: string
          enum:
            - response.create
          description: The event type, must be `response.create`.
        response:
          $ref: '#/components/schemas/RealtimeResponseOptions'
      allOf:
        - $ref: '#/components/schemas/RealtimeClientEvent'
      description: |-
        This event instructs the server to create a Response, which means triggering 
        model inference. When in Server VAD mode, the server will create Responses 
        automatically.

        A Response will include at least one Item, and may have two, in which case 
        the second will be a function call. These Items will be appended to the 
        conversation history.

        The server will respond with a `response.created` event, events for Items 
        and content created, and finally a `response.done` event to indicate the 
        Response is complete.

        The `response.create` event includes inference configuration like 
        `instructions`, and `temperature`. These fields will override the Session's 
        configuration for this Response only.
    RealtimeClientEventSessionUpdate:
      type: object
      required:
        - type
        - session
      properties:
        type:
          type: string
          enum:
            - session.update
          description: The event type, must be `session.update`.
        session:
          $ref: '#/components/schemas/RealtimeRequestSession'
      allOf:
        - $ref: '#/components/schemas/RealtimeClientEvent'
      description: |-
        Send this event to update the session’s default configuration. The client may 
        send this event at any time to update the session configuration, and any 
        field may be updated at any time, except for "voice". The server will respond 
        with a `session.updated` event that shows the full effective configuration. 
        Only fields that are present are updated, thus the correct way to clear a 
        field like "instructions" is to pass an empty string.
    RealtimeClientEventType:
      anyOf:
        - type: string
        - type: string
          enum:
            - session.update
            - input_audio_buffer.append
            - input_audio_buffer.commit
            - input_audio_buffer.clear
            - conversation.item.create
            - conversation.item.delete
            - conversation.item.truncate
            - response.create
            - response.cancel
    RealtimeContentPart:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/RealtimeContentPartType'
      discriminator:
        propertyName: type
        mapping:
          input_text: '#/components/schemas/RealtimeRequestTextContentPart'
          input_audio: '#/components/schemas/RealtimeRequestAudioContentPart'
          text: '#/components/schemas/RealtimeResponseTextContentPart'
          audio: '#/components/schemas/RealtimeResponseAudioContentPart'
    RealtimeContentPartType:
      anyOf:
        - type: string
        - type: string
          enum:
            - input_text
            - input_audio
            - text
            - audio
    RealtimeConversationItemBase:
      type: object
      description: The item to add to the conversation.
      x-oaiExpandable: true
    RealtimeConversationRequestItem:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/RealtimeItemType'
        id:
          type: string
      discriminator:
        propertyName: type
        mapping:
          message: '#/components/schemas/RealtimeRequestMessageItem'
          function_call: '#/components/schemas/RealtimeRequestFunctionCallItem'
          function_call_output: '#/components/schemas/RealtimeRequestFunctionCallOutputItem'
    RealtimeConversationResponseItem:
      type: object
      required:
        - object
        - type
        - id
      properties:
        object:
          type: string
          enum:
            - realtime.item
        type:
          $ref: '#/components/schemas/RealtimeItemType'
        id:
          type: string
          nullable: true
      discriminator:
        propertyName: type
        mapping:
          message: '#/components/schemas/RealtimeResponseMessageItem'
          function_call: '#/components/schemas/RealtimeResponseFunctionCallItem'
          function_call_output: '#/components/schemas/RealtimeResponseFunctionCallOutputItem'
    RealtimeFunctionTool:
      type: object
      required:
        - type
        - name
      properties:
        type:
          type: string
          enum:
            - function
        name:
          type: string
        description:
          type: string
        parameters: {}
      allOf:
        - $ref: '#/components/schemas/RealtimeTool'
      description: The definition of a function tool as used by the realtime endpoint.
    RealtimeItemStatus:
      anyOf:
        - type: string
        - type: string
          enum:
            - in_progress
            - completed
            - incomplete
    RealtimeItemType:
      anyOf:
        - type: string
        - type: string
          enum:
            - message
            - function_call
            - function_call_output
    RealtimeMessageRole:
      anyOf:
        - type: string
        - type: string
          enum:
            - system
            - user
            - assistant
    RealtimeRequestAssistantMessageItem:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - assistant
        content:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeRequestTextContentPart'
      allOf:
        - $ref: '#/components/schemas/RealtimeRequestMessageItem'
    RealtimeRequestAudioContentPart:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - input_audio
        transcript:
          type: string
      allOf:
        - $ref: '#/components/schemas/RealtimeContentPart'
    RealtimeRequestFunctionCallItem:
      type: object
      required:
        - type
        - name
        - call_id
        - arguments
      properties:
        type:
          type: string
          enum:
            - function_call
        name:
          type: string
        call_id:
          type: string
        arguments:
          type: string
        status:
          $ref: '#/components/schemas/RealtimeItemStatus'
      allOf:
        - $ref: '#/components/schemas/RealtimeConversationRequestItem'
    RealtimeRequestFunctionCallOutputItem:
      type: object
      required:
        - type
        - call_id
        - output
      properties:
        type:
          type: string
          enum:
            - function_call_output
        call_id:
          type: string
        output:
          type: string
      allOf:
        - $ref: '#/components/schemas/RealtimeConversationRequestItem'
    RealtimeRequestMessageItem:
      type: object
      required:
        - type
        - role
      properties:
        type:
          type: string
          enum:
            - message
        role:
          $ref: '#/components/schemas/RealtimeMessageRole'
        status:
          $ref: '#/components/schemas/RealtimeItemStatus'
      discriminator:
        propertyName: role
        mapping:
          system: '#/components/schemas/RealtimeRequestSystemMessageItem'
          user: '#/components/schemas/RealtimeRequestUserMessageItem'
          assistant: '#/components/schemas/RealtimeRequestAssistantMessageItem'
      allOf:
        - $ref: '#/components/schemas/RealtimeConversationRequestItem'
    RealtimeRequestMessageReferenceItem:
      type: object
      required:
        - type
        - id
      properties:
        type:
          type: string
          enum:
            - message
        id:
          type: string
    RealtimeRequestSession:
      type: object
      properties:
        modalities:
          type: array
          items:
            type: string
            enum:
              - text
              - audio
        instructions:
          type: string
        voice:
          $ref: '#/components/schemas/RealtimeVoice'
        input_audio_format:
          $ref: '#/components/schemas/RealtimeAudioFormat'
        output_audio_format:
          $ref: '#/components/schemas/RealtimeAudioFormat'
        input_audio_transcription:
          type: object
          allOf:
            - $ref: '#/components/schemas/RealtimeAudioInputTranscriptionSettings'
          nullable: true
        turn_detection:
          type: object
          allOf:
            - $ref: '#/components/schemas/RealtimeTurnDetection'
          nullable: true
        tools:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeTool'
        tool_choice:
          $ref: '#/components/schemas/RealtimeToolChoice'
        temperature:
          type: number
          format: float
        max_response_output_tokens:
          anyOf:
            - type: integer
              format: int32
            - type: string
              enum:
                - inf
    RealtimeRequestSystemMessageItem:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - system
        content:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeRequestTextContentPart'
      allOf:
        - $ref: '#/components/schemas/RealtimeRequestMessageItem'
    RealtimeRequestTextContentPart:
      type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          enum:
            - input_text
        text:
          type: string
      allOf:
        - $ref: '#/components/schemas/RealtimeContentPart'
    RealtimeRequestUserMessageItem:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - user
        content:
          type: array
          items:
            anyOf:
              - $ref: '#/components/schemas/RealtimeRequestTextContentPart'
              - $ref: '#/components/schemas/RealtimeRequestAudioContentPart'
      allOf:
        - $ref: '#/components/schemas/RealtimeRequestMessageItem'
    RealtimeResponse:
      type: object
      required:
        - object
        - id
        - status
        - status_details
        - output
        - usage
      properties:
        object:
          type: string
          enum:
            - realtime.response
        id:
          type: string
        status:
          allOf:
            - $ref: '#/components/schemas/RealtimeResponseStatus'
          default: in_progress
        status_details:
          type: object
          allOf:
            - $ref: '#/components/schemas/RealtimeResponseStatusDetails'
          nullable: true
        output:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeConversationResponseItem'
        usage:
          type: object
          properties:
            total_tokens:
              type: integer
              format: int32
            input_tokens:
              type: integer
              format: int32
            output_tokens:
              type: integer
              format: int32
            input_token_details:
              type: object
              properties:
                cached_tokens:
                  type: integer
                  format: int32
                text_tokens:
                  type: integer
                  format: int32
                audio_tokens:
                  type: integer
                  format: int32
              required:
                - cached_tokens
                - text_tokens
                - audio_tokens
            output_token_details:
              type: object
              properties:
                text_tokens:
                  type: integer
                  format: int32
                audio_tokens:
                  type: integer
                  format: int32
              required:
                - text_tokens
                - audio_tokens
          required:
            - total_tokens
            - input_tokens
            - output_tokens
            - input_token_details
            - output_token_details
    RealtimeResponseAudioContentPart:
      type: object
      required:
        - type
        - transcript
      properties:
        type:
          type: string
          enum:
            - audio
        transcript:
          type: string
          nullable: true
      allOf:
        - $ref: '#/components/schemas/RealtimeContentPart'
    RealtimeResponseBase:
      type: object
      description: The response resource.
    RealtimeResponseFunctionCallItem:
      type: object
      required:
        - type
        - name
        - call_id
        - arguments
        - status
      properties:
        type:
          type: string
          enum:
            - function_call
        name:
          type: string
        call_id:
          type: string
        arguments:
          type: string
        status:
          $ref: '#/components/schemas/RealtimeItemStatus'
      allOf:
        - $ref: '#/components/schemas/RealtimeConversationResponseItem'
    RealtimeResponseFunctionCallOutputItem:
      type: object
      required:
        - type
        - call_id
        - output
      properties:
        type:
          type: string
          enum:
            - function_call_output
        call_id:
          type: string
        output:
          type: string
      allOf:
        - $ref: '#/components/schemas/RealtimeConversationResponseItem'
    RealtimeResponseMessageItem:
      type: object
      required:
        - type
        - role
        - content
        - status
      properties:
        type:
          type: string
          enum:
            - message
        role:
          $ref: '#/components/schemas/RealtimeMessageRole'
        content:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeContentPart'
        status:
          $ref: '#/components/schemas/RealtimeItemStatus'
      allOf:
        - $ref: '#/components/schemas/RealtimeConversationResponseItem'
    RealtimeResponseOptions:
      type: object
      properties:
        modalities:
          type: array
          items:
            type: string
            enum:
              - text
              - audio
          description: The modalities for the response.
        instructions:
          type: string
          description: Instructions for the model.
        voice:
          allOf:
            - $ref: '#/components/schemas/RealtimeVoice'
          description: The voice the model uses to respond - one of `alloy`, `echo`, or `shimmer`.
        output_audio_format:
          allOf:
            - $ref: '#/components/schemas/RealtimeAudioFormat'
          description: The format of output audio.
        tools:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeTool'
          description: Tools (functions) available to the model.
        tool_choice:
          allOf:
            - $ref: '#/components/schemas/RealtimeToolChoice'
          description: How the model chooses tools.
        temperature:
          type: number
          format: float
          description: Sampling temperature.
        max_output_tokens:
          anyOf:
            - type: integer
              format: int32
            - type: string
              enum:
                - inf
          description: Maximum number of output tokens for a single assistant response, inclusive of tool calls. Provide an integer between 1 and 4096 to limit output tokens, or "inf" for the maximum available tokens for a given model. Defaults to "inf".
    RealtimeResponseSession:
      type: object
      required:
        - object
        - id
        - model
        - modalities
        - instructions
        - voice
        - input_audio_format
        - output_audio_format
        - input_audio_transcription
        - turn_detection
        - tools
        - tool_choice
        - temperature
        - max_response_output_tokens
      properties:
        object:
          type: string
          enum:
            - realtime.session
        id:
          type: string
        model:
          type: string
        modalities:
          type: array
          items:
            type: string
            enum:
              - text
              - audio
        instructions:
          type: string
        voice:
          $ref: '#/components/schemas/RealtimeVoice'
        input_audio_format:
          $ref: '#/components/schemas/RealtimeAudioFormat'
        output_audio_format:
          $ref: '#/components/schemas/RealtimeAudioFormat'
        input_audio_transcription:
          type: object
          allOf:
            - $ref: '#/components/schemas/RealtimeAudioInputTranscriptionSettings'
          nullable: true
        turn_detection:
          $ref: '#/components/schemas/RealtimeTurnDetection'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeTool'
        tool_choice:
          $ref: '#/components/schemas/RealtimeToolChoice'
        temperature:
          type: number
          format: float
        max_response_output_tokens:
          anyOf:
            - type: integer
              format: int32
            - type: string
              enum:
                - inf
          nullable: true
    RealtimeResponseStatus:
      anyOf:
        - type: string
        - type: string
          enum:
            - in_progress
            - completed
            - cancelled
            - incomplete
            - failed
    RealtimeResponseStatusDetails:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/RealtimeResponseStatus'
      discriminator:
        propertyName: type
    RealtimeResponseTextContentPart:
      type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          enum:
            - text
        text:
          type: string
      allOf:
        - $ref: '#/components/schemas/RealtimeContentPart'
    RealtimeServerEvent:
      type: object
      required:
        - type
        - event_id
      properties:
        type:
          $ref: '#/components/schemas/RealtimeServerEventType'
        event_id:
          type: string
      discriminator:
        propertyName: type
        mapping:
          error: '#/components/schemas/RealtimeServerEventError'
          session.created: '#/components/schemas/RealtimeServerEventSessionCreated'
          session.updated: '#/components/schemas/RealtimeServerEventSessionUpdated'
          conversation.created: '#/components/schemas/RealtimeServerEventConversationCreated'
          input_audio_buffer.committed: '#/components/schemas/RealtimeServerEventInputAudioBufferCommitted'
          input_audio_buffer.cleared: '#/components/schemas/RealtimeServerEventInputAudioBufferCleared'
          input_audio_buffer.speech_started: '#/components/schemas/RealtimeServerEventInputAudioBufferSpeechStarted'
          input_audio_buffer.speech_stopped: '#/components/schemas/RealtimeServerEventInputAudioBufferSpeechStopped'
          conversation.item.created: '#/components/schemas/RealtimeServerEventConversationItemCreated'
          conversation.item.input_audio_transcription.completed: '#/components/schemas/RealtimeServerEventConversationItemInputAudioTranscriptionCompleted'
          conversation.item.input_audio_transcription.failed: '#/components/schemas/RealtimeServerEventConversationItemInputAudioTranscriptionFailed'
          conversation.item.truncated: '#/components/schemas/RealtimeServerEventConversationItemTruncated'
          conversation.item.deleted: '#/components/schemas/RealtimeServerEventConversationItemDeleted'
          response.created: '#/components/schemas/RealtimeServerEventResponseCreated'
          response.done: '#/components/schemas/RealtimeServerEventResponseDone'
          response.output_item.added: '#/components/schemas/RealtimeServerEventResponseOutputItemAdded'
          response.output_item.done: '#/components/schemas/RealtimeServerEventResponseOutputItemDone'
          response.content_part.added: '#/components/schemas/RealtimeServerEventResponseContentPartAdded'
          response.content_part.done: '#/components/schemas/RealtimeServerEventResponseContentPartDone'
          response.text.delta: '#/components/schemas/RealtimeServerEventResponseTextDelta'
          response.text.done: '#/components/schemas/RealtimeServerEventResponseTextDone'
          response.audio_transcript.delta: '#/components/schemas/RealtimeServerEventResponseAudioTranscriptDelta'
          response.audio_transcript.done: '#/components/schemas/RealtimeServerEventResponseAudioTranscriptDone'
          response.audio.delta: '#/components/schemas/RealtimeServerEventResponseAudioDelta'
          response.audio.done: '#/components/schemas/RealtimeServerEventResponseAudioDone'
          response.function_call_arguments.delta: '#/components/schemas/RealtimeServerEventResponseFunctionCallArgumentsDelta'
          response.function_call_arguments.done: '#/components/schemas/RealtimeServerEventResponseFunctionCallArgumentsDone'
          rate_limits.updated: '#/components/schemas/RealtimeServerEventRateLimitsUpdated'
    RealtimeServerEventConversationCreated:
      type: object
      required:
        - type
        - conversation
      properties:
        type:
          type: string
          enum:
            - conversation.created
          description: The event type, must be `conversation.created`.
        conversation:
          type: object
          properties:
            id:
              type: string
              description: The unique ID of the conversation.
            object:
              type: string
              description: The object type, must be `realtime.conversation`.
          description: The conversation resource.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: Returned when a conversation is created. Emitted right after session creation.
    RealtimeServerEventConversationItemCreated:
      type: object
      required:
        - type
        - previous_item_id
        - item
      properties:
        type:
          type: string
          enum:
            - conversation.item.created
          description: The event type, must be `conversation.item.created`.
        previous_item_id:
          type: string
          description: |-
            The ID of the preceding item in the Conversation context, allows the 
            client to understand the order of the conversation.
        item:
          $ref: '#/components/schemas/RealtimeConversationResponseItem'
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when a conversation item is created. There are several scenarios that 
        produce this event:
          - The server is generating a Response, which if successful will produce 
            either one or two Items, which will be of type `message` 
            (role `assistant`) or type `function_call`.
          - The input audio buffer has been committed, either by the client or the 
            server (in `server_vad` mode). The server will take the content of the 
            input audio buffer and add it to a new user message Item.
          - The client has sent a `conversation.item.create` event to add a new Item 
            to the Conversation.
    RealtimeServerEventConversationItemDeleted:
      type: object
      required:
        - type
        - item_id
      properties:
        type:
          type: string
          enum:
            - conversation.item.deleted
          description: The event type, must be `conversation.item.deleted`.
        item_id:
          type: string
          description: The ID of the item that was deleted.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when an item in the conversation is deleted by the client with a 
        `conversation.item.delete` event. This event is used to synchronize the 
        server's understanding of the conversation history with the client's view.
    RealtimeServerEventConversationItemInputAudioTranscriptionCompleted:
      type: object
      required:
        - type
        - item_id
        - content_index
        - transcript
      properties:
        type:
          type: string
          enum:
            - conversation.item.input_audio_transcription.completed
          description: |-
            The event type, must be
            `conversation.item.input_audio_transcription.completed`.
        item_id:
          type: string
          description: The ID of the user message item containing the audio.
        content_index:
          type: integer
          format: int32
          description: The index of the content part containing the audio.
        transcript:
          type: string
          description: The transcribed text.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        This event is the output of audio transcription for user audio written to the 
        user audio buffer. Transcription begins when the input audio buffer is 
        committed by the client or server (in `server_vad` mode). Transcription runs 
        asynchronously with Response creation, so this event may come before or after 
        the Response events.

        Realtime API models accept audio natively, and thus input transcription is a 
        separate process run on a separate ASR (Automatic Speech Recognition) model, 
        currently always `whisper-1`. Thus the transcript may diverge somewhat from 
        the model's interpretation, and should be treated as a rough guide.
    RealtimeServerEventConversationItemInputAudioTranscriptionFailed:
      type: object
      required:
        - type
        - item_id
        - content_index
        - error
      properties:
        type:
          type: string
          enum:
            - conversation.item.input_audio_transcription.failed
          description: |-
            The event type, must be
            `conversation.item.input_audio_transcription.failed`.
        item_id:
          type: string
          description: The ID of the user message item.
        content_index:
          type: integer
          format: int32
          description: The index of the content part containing the audio.
        error:
          type: object
          properties:
            type:
              type: string
              description: The type of error.
            code:
              type: string
              description: Error code, if any.
            message:
              type: string
              description: A human-readable error message.
            param:
              type: string
              description: Parameter related to the error, if any.
          description: Details of the transcription error.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when input audio transcription is configured, and a transcription 
        request for a user message failed. These events are separate from other 
        `error` events so that the client can identify the related Item.
    RealtimeServerEventConversationItemTruncated:
      type: object
      required:
        - type
        - item_id
        - content_index
        - audio_end_ms
      properties:
        type:
          type: string
          enum:
            - conversation.item.truncated
          description: The event type, must be `conversation.item.truncated`.
        item_id:
          type: string
          description: The ID of the assistant message item that was truncated.
        content_index:
          type: integer
          format: int32
          description: The index of the content part that was truncated.
        audio_end_ms:
          type: integer
          format: int32
          description: The duration up to which the audio was truncated, in milliseconds.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when an earlier assistant audio message item is truncated by the 
        client with a `conversation.item.truncate` event. This event is used to 
        synchronize the server's understanding of the audio with the client's playback.

        This action will truncate the audio and remove the server-side text transcript 
        to ensure there is no text in the context that hasn't been heard by the user.
    RealtimeServerEventError:
      type: object
      required:
        - type
        - error
      properties:
        type:
          type: string
          enum:
            - error
          description: The event type, must be `error`.
        error:
          type: object
          properties:
            type:
              type: string
              description: The type of error (e.g., "invalid_request_error", "server_error").
            code:
              type: string
              description: Error code, if any.
            message:
              type: string
              description: A human-readable error message.
            param:
              type: string
              description: Parameter related to the error, if any.
            event_id:
              type: string
              description: The event_id of the client event that caused the error, if applicable.
          description: Details of the error.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when an error occurs, which could be a client problem or a server 
        problem. Most errors are recoverable and the session will stay open, we 
        recommend to implementors to monitor and log error messages by default.
    RealtimeServerEventInputAudioBufferCleared:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - input_audio_buffer.cleared
          description: The event type, must be `input_audio_buffer.cleared`.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when the input audio buffer is cleared by the client with a 
        `input_audio_buffer.clear` event.
    RealtimeServerEventInputAudioBufferCommitted:
      type: object
      required:
        - type
        - previous_item_id
        - item_id
      properties:
        type:
          type: string
          enum:
            - input_audio_buffer.committed
          description: The event type, must be `input_audio_buffer.committed`.
        previous_item_id:
          type: string
          description: The ID of the preceding item after which the new item will be inserted.
        item_id:
          type: string
          description: The ID of the user message item that will be created.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when an input audio buffer is committed, either by the client or 
        automatically in server VAD mode. The `item_id` property is the ID of the user
        message item that will be created, thus a `conversation.item.created` event 
        will also be sent to the client.
    RealtimeServerEventInputAudioBufferSpeechStarted:
      type: object
      required:
        - type
        - audio_start_ms
        - item_id
      properties:
        type:
          type: string
          enum:
            - input_audio_buffer.speech_started
          description: The event type, must be `input_audio_buffer.speech_started`.
        audio_start_ms:
          type: integer
          format: int32
          description: |-
            Milliseconds from the start of all audio written to the buffer during the 
            session when speech was first detected. This will correspond to the 
            beginning of audio sent to the model, and thus includes the 
            `prefix_padding_ms` configured in the Session.
        item_id:
          type: string
          description: The ID of the user message item that will be created when speech stops.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Sent by the server when in `server_vad` mode to indicate that speech has been 
        detected in the audio buffer. This can happen any time audio is added to the 
        buffer (unless speech is already detected). The client may want to use this 
        event to interrupt audio playback or provide visual feedback to the user. 

        The client should expect to receive a `input_audio_buffer.speech_stopped` event 
        when speech stops. The `item_id` property is the ID of the user message item 
        that will be created when speech stops and will also be included in the 
        `input_audio_buffer.speech_stopped` event (unless the client manually commits 
        the audio buffer during VAD activation).
    RealtimeServerEventInputAudioBufferSpeechStopped:
      type: object
      required:
        - type
        - audio_end_ms
        - item_id
      properties:
        type:
          type: string
          enum:
            - input_audio_buffer.speech_stopped
          description: The event type, must be `input_audio_buffer.speech_stopped`.
        audio_end_ms:
          type: integer
          format: int32
          description: |-
            Milliseconds since the session started when speech stopped. This will 
            correspond to the end of audio sent to the model, and thus includes the 
            `min_silence_duration_ms` configured in the Session.
        item_id:
          type: string
          description: The ID of the user message item that will be created.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned in `server_vad` mode when the server detects the end of speech in 
        the audio buffer. The server will also send an `conversation.item.created` 
        event with the user message item that is created from the audio buffer.
    RealtimeServerEventRateLimitsUpdated:
      type: object
      required:
        - type
        - rate_limits
      properties:
        type:
          type: string
          enum:
            - rate_limits.updated
          description: The event type, must be `rate_limits.updated`.
        rate_limits:
          type: array
          items:
            $ref: '#/components/schemas/RealtimeServerEventRateLimitsUpdatedRateLimitsItem'
          description: List of rate limit information.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Emitted at the beginning of a Response to indicate the updated rate limits. 
        When a Response is created some tokens will be "reserved" for the output 
        tokens, the rate limits shown here reflect that reservation, which is then 
        adjusted accordingly once the Response is completed.
    RealtimeServerEventRateLimitsUpdatedRateLimitsItem:
      type: object
      required:
        - name
        - limit
        - remaining
        - reset_seconds
      properties:
        name:
          type: string
          description: The rate limit property name that this item includes information about.
        limit:
          type: integer
          format: int32
          description: The maximum configured limit for this rate limit property.
        remaining:
          type: integer
          format: int32
          description: The remaining quota available against the configured limit for this rate limit property.
        reset_seconds:
          type: number
          format: float
          description: The remaining time, in seconds, until this rate limit property is reset.
    RealtimeServerEventResponseAudioDelta:
      type: object
      required:
        - type
        - response_id
        - item_id
        - output_index
        - content_index
        - delta
      properties:
        type:
          type: string
          enum:
            - response.audio.delta
          description: The event type, must be `response.audio.delta`.
        response_id:
          type: string
          description: The ID of the response.
        item_id:
          type: string
          description: The ID of the item.
        output_index:
          type: integer
          format: int32
          description: The index of the output item in the response.
        content_index:
          type: integer
          format: int32
          description: The index of the content part in the item's content array.
        delta:
          type: string
          format: base64
          description: Base64-encoded audio data delta.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: Returned when the model-generated audio is updated.
    RealtimeServerEventResponseAudioDone:
      type: object
      required:
        - type
        - response_id
        - item_id
        - output_index
        - content_index
      properties:
        type:
          type: string
          enum:
            - response.audio.done
          description: The event type, must be `response.audio.done`.
        response_id:
          type: string
          description: The ID of the response.
        item_id:
          type: string
          description: The ID of the item.
        output_index:
          type: integer
          format: int32
          description: The index of the output item in the response.
        content_index:
          type: integer
          format: int32
          description: The index of the content part in the item's content array.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when the model-generated audio is done. Also emitted when a Response
        is interrupted, incomplete, or cancelled.
    RealtimeServerEventResponseAudioTranscriptDelta:
      type: object
      required:
        - type
        - response_id
        - item_id
        - output_index
        - content_index
        - delta
      properties:
        type:
          type: string
          enum:
            - response.audio_transcript.delta
          description: The event type, must be `response.audio_transcript.delta`.
        response_id:
          type: string
          description: The ID of the response.
        item_id:
          type: string
          description: The ID of the item.
        output_index:
          type: integer
          format: int32
          description: The index of the output item in the response.
        content_index:
          type: integer
          format: int32
          description: The index of the content part in the item's content array.
        delta:
          type: string
          description: The transcript delta.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: Returned when the model-generated transcription of audio output is updated.
    RealtimeServerEventResponseAudioTranscriptDone:
      type: object
      required:
        - type
        - response_id
        - item_id
        - output_index
        - content_index
        - transcript
      properties:
        type:
          type: string
          enum:
            - response.audio_transcript.done
          description: The event type, must be `response.audio_transcript.done`.
        response_id:
          type: string
          description: The ID of the response.
        item_id:
          type: string
          description: The ID of the item.
        output_index:
          type: integer
          format: int32
          description: The index of the output item in the response.
        content_index:
          type: integer
          format: int32
          description: The index of the content part in the item's content array.
        transcript:
          type: string
          description: The final transcript of the audio.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when the model-generated transcription of audio output is done
        streaming. Also emitted when a Response is interrupted, incomplete, or
        cancelled.
    RealtimeServerEventResponseContentPartAdded:
      type: object
      required:
        - type
        - response_id
        - item_id
        - output_index
        - content_index
        - part
      properties:
        type:
          type: string
          enum:
            - response.content_part.added
          description: The event type, must be `response.content_part.added`.
        response_id:
          type: string
          description: The ID of the response.
        item_id:
          type: string
          description: The ID of the item to which the content part was added.
        output_index:
          type: integer
          format: int32
          description: The index of the output item in the response.
        content_index:
          type: integer
          format: int32
          description: The index of the content part in the item's content array.
        part:
          allOf:
            - $ref: '#/components/schemas/RealtimeContentPart'
          description: The content part that was added.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when a new content part is added to an assistant message item during
        response generation.
    RealtimeServerEventResponseContentPartDone:
      type: object
      required:
        - type
        - response_id
        - item_id
        - output_index
        - content_index
        - part
      properties:
        type:
          type: string
          enum:
            - response.content_part.done
          description: The event type, must be `response.content_part.done`.
        response_id:
          type: string
          description: The ID of the response.
        item_id:
          type: string
          description: The ID of the item.
        output_index:
          type: integer
          format: int32
          description: The index of the output item in the response.
        content_index:
          type: integer
          format: int32
          description: The index of the content part in the item's content array.
        part:
          allOf:
            - $ref: '#/components/schemas/RealtimeContentPart'
          description: The content part that is done.
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when a content part is done streaming in an assistant message item.
        Also emitted when a Response is interrupted, incomplete, or cancelled.
    RealtimeServerEventResponseCreated:
      type: object
      required:
        - type
        - response
      properties:
        type:
          type: string
          enum:
            - response.created
          description: The event type, must be `response.created`.
        response:
          $ref: '#/components/schemas/RealtimeResponse'
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when a new Response is created. The first event of response creation,
        where the response is in an initial state of `in_progress`.
    RealtimeServerEventResponseDone:
      type: object
      required:
        - type
        - response
      properties:
        type:
          type: string
          enum:
            - response.done
          description: The event type, must be `response.done`.
        response:
          $ref: '#/components/schemas/RealtimeResponse'
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when a Response is done streaming. Always emitted, no matter the 
        final state. The Response object included in the `response.done` event will 
        include all output Items in the Response but will omit the raw audio data.
    RealtimeServerEventResponseFunctionCallArgumentsDelta:
