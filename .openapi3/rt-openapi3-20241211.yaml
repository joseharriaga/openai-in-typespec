    RealtimeServerEventSessionCreated:
      type: object
      required:
        - type
        - session
      properties:
        type:
          type: string
          enum:
            - session.created
          description: The event type, must be `session.created`.
        session:
          $ref: '#/components/schemas/RealtimeResponseSession'
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when a Session is created. Emitted automatically when a new 
        connection is established as the first server event. This event will contain 
        the default Session configuration.
    RealtimeServerEventSessionUpdated:
      type: object
      required:
        - type
        - session
      properties:
        type:
          type: string
          enum:
            - session.updated
          description: The event type, must be `session.updated`.
        session:
          $ref: '#/components/schemas/RealtimeResponseSession'
      allOf:
        - $ref: '#/components/schemas/RealtimeServerEvent'
      description: |-
        Returned when a session is updated with a `session.update` event, unless 
        there is an error.
    RealtimeServerEventType:
      anyOf:
        - type: string
        - type: string
          enum:
            - session.created
            - session.updated
            - conversation.created
            - conversation.item.created
            - conversation.item.deleted
            - conversation.item.truncated
            - response.created
            - response.done
            - rate_limits.updated
            - response.output_item.added
            - response.output_item.done
            - response.content_part.added
            - response.content_part.done
            - response.audio.delta
            - response.audio.done
            - response.audio_transcript.delta
            - response.audio_transcript.done
            - response.text.delta
            - response.text.done
            - response.function_call_arguments.delta
            - response.function_call_arguments.done
            - input_audio_buffer.speech_started
            - input_audio_buffer.speech_stopped
            - conversation.item.input_audio_transcription.completed
            - conversation.item.input_audio_transcription.failed
            - input_audio_buffer.committed
            - input_audio_buffer.cleared
            - error
    RealtimeServerVadTurnDetection:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - server_vad
        threshold:
          type: number
          format: float
          default: 0.5
        prefix_padding_ms:
          type: string
          format: duration
        silence_duration_ms:
          type: string
          format: duration
      allOf:
        - $ref: '#/components/schemas/RealtimeTurnDetection'
    RealtimeSessionBase:
      type: object
      description: Realtime session object configuration.
    RealtimeTool:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/RealtimeToolType'
      discriminator:
        propertyName: type
        mapping:
          function: '#/components/schemas/RealtimeFunctionTool'
      description: The base representation of a realtime tool definition.
    RealtimeToolChoice:
      anyOf:
        - $ref: '#/components/schemas/RealtimeToolChoiceLiteral'
        - $ref: '#/components/schemas/RealtimeToolChoiceObject'
      description: |-
        The combined set of available representations for a realtime tool_choice parameter, encompassing both string
        literal options like 'auto' as well as structured references to defined tools.
    RealtimeToolChoiceFunctionObject:
      type: object
      required:
        - type
        - function
      properties:
        type:
          type: string
          enum:
            - function
        function:
          type: object
          properties:
            name:
              type: string
          required:
            - name
      allOf:
        - $ref: '#/components/schemas/RealtimeToolChoiceObject'
      description: The representation of a realtime tool_choice selecting a named function tool.
    RealtimeToolChoiceLiteral:
      anyOf:
        - type: string
        - type: string
          enum:
            - auto
            - none
            - required
      description: The available set of mode-level, string literal tool_choice options for the realtime endpoint.
    RealtimeToolChoiceObject:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/RealtimeToolType'
      discriminator:
        propertyName: type
        mapping:
          function: '#/components/schemas/RealtimeToolChoiceFunctionObject'
      description: A base representation for a realtime tool_choice selecting a named tool.
    RealtimeToolType:
      anyOf:
        - type: string
        - type: string
          enum:
            - function
      description: |-
        The supported tool type discriminators for realtime tools.
        Currently, only 'function' tools are supported.
    RealtimeTurnDetection:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/RealtimeTurnDetectionType'
      discriminator:
        propertyName: type
        mapping:
          server_vad: '#/components/schemas/RealtimeServerVadTurnDetection'
    RealtimeTurnDetectionType:
      anyOf:
        - type: string
        - type: string
          enum:
            - server_vad
    RealtimeVoice:
      anyOf:
        - type: string
        - type: string
          enum:
            - alloy
            - shimmer
            - echo
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
servers:
  - url: https://api.openai.com/v1
    description: OpenAI Endpoint
    variables: {}
