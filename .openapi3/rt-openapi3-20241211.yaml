        response_id:
          type: string
          description: The ID of the response.
        item_id:
          type: string
          description: The ID of the function call item.
        output_index:
          type: integer
          format: int32
          description: The index of the output item in the response.
        call_id:
          type: string
          description: The ID of the function call.
        arguments:
